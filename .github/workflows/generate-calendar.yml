name: Generate pixel calendar

on:
  schedule:
    # Runs hourly at :05. Each timezone variant computes its own local date,
    # so an hourly run means every timezone's calendar flips to the new day
    # shortly after that timezone crosses local midnight (e.g. the Taipei
    # variant updates just after 00:00 in Taipei, New York just after 00:00
    # in New York, and so on). GitHub's scheduled runs are best-effort and
    # may be delayed by a few minutes to an hour.
    - cron: "5 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate all calendar SVG variants
        run: npm run generate:all

      - name: Publish to the output branch
        run: |
          set -e
          mkdir -p /tmp/pixel-calendar-output
          cp -r dist/*.svg /tmp/pixel-calendar-output/

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin output || true
          if git show-ref --verify --quiet refs/remotes/origin/output; then
            git checkout -B output origin/output
          else
            git checkout --orphan output
            git rm -rf . > /dev/null 2>&1 || true
          fi

          mkdir -p dist
          rm -f dist/*.svg
          cp /tmp/pixel-calendar-output/*.svg dist/

          git add dist/*.svg
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "chore: update pixel calendar SVGs"
            git push origin output
          fi
